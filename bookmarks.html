<!DOCTYPE html>
<html lang="zh-CN" data-theme="glass" data-density="normal">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markly</title>
<style>
:root {
  --accent: #6366f1;
  --accent-ink: #ffffff;
  --r-card: 18px;
  --r-sm: 11px;
  --r-pill: 999px;
  --gap: 18px;
  --tile: 116px;
  --font-zh: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
  --font-display: "Segoe UI", -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --ease: cubic-bezier(.22,.61,.36,1);
}

html[data-density="compact"]  { --tile: 92px;  --gap: 12px; }
html[data-density="normal"]   { --tile: 116px; --gap: 18px; }
html[data-density="comfort"]  { --tile: 144px; --gap: 26px; }

html[data-theme="glass"] {
  --text:#1b1d24; --text-dim:rgba(27,29,36,.62); --text-faint:rgba(27,29,36,.42);
  --panel:rgba(255,255,255,.46); --panel-blur:22px; --panel-border:rgba(255,255,255,.6);
  --card:rgba(255,255,255,.4); --card-hover:rgba(255,255,255,.72); --card-border:rgba(255,255,255,.4);
  --field:rgba(255,255,255,.55); --field-border:rgba(255,255,255,.7);
  --shadow:0 10px 34px rgba(20,24,50,.16); --shadow-pop:0 18px 50px rgba(20,24,50,.26);
}
html[data-theme="light"] {
  --text:#1b1d24; --text-dim:rgba(27,29,36,.58); --text-faint:rgba(27,29,36,.4);
  --panel:#ffffff; --panel-blur:0px; --panel-border:rgba(20,22,40,.07);
  --card:#ffffff; --card-hover:#ffffff; --card-border:rgba(20,22,40,.08);
  --field:#f1f3f7; --field-border:rgba(20,22,40,.1);
  --shadow:0 1px 2px rgba(15,20,40,.05), 0 10px 28px rgba(15,25,60,.06); --shadow-pop:0 24px 60px rgba(15,25,60,.16);
}
html[data-theme="dark"] {
  --text:#e9ebf2; --text-dim:rgba(233,235,242,.6); --text-faint:rgba(233,235,242,.4);
  --panel:rgba(24,27,34,.66); --panel-blur:24px; --panel-border:rgba(255,255,255,.09);
  --card:rgba(30,34,42,.6); --card-hover:rgba(42,47,58,.85); --card-border:rgba(255,255,255,.08);
  --field:rgba(255,255,255,.06); --field-border:rgba(255,255,255,.12);
  --shadow:0 12px 40px rgba(0,0,0,.45); --shadow-pop:0 24px 64px rgba(0,0,0,.6);
}

* { box-sizing:border-box; }
html, body { height:100%; margin:0; }
body {
  font-family:var(--font-zh); color:var(--text);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow-y:scroll;
}

#wall {
  position:fixed; inset:0; z-index:0; background-size:cover; background-position:center;
  transition:filter .25s var(--ease);
}
#root { position:relative; z-index:3; }

::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-thumb { background:var(--text-faint); border-radius:99px; border:3px solid transparent; background-clip:content-box; }

.app { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:0 28px 120px; }
.wrap { width:100%; max-width:1080px; }

.glass {
  background:var(--panel); backdrop-filter:blur(var(--panel-blur)) saturate(1.4);
  -webkit-backdrop-filter:blur(var(--panel-blur)) saturate(1.4);
  border:1px solid var(--panel-border);
}

/* loading */
.loading-screen { position:fixed; inset:0; display:grid; place-items:center; background:#f0f0f0; z-index:100; }
.loading-spinner { width:40px; height:40px; border:3px solid rgba(99,102,241,.2); border-top-color:#6366f1; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* hero */
.hero { padding:54px 0 22px; text-align:center; position:relative; z-index:9999; }
.clock { font-family:var(--font-display); font-weight:600; font-size:64px; letter-spacing:-2px; line-height:1; color:var(--text); }
html[data-theme="glass"] .clock, html[data-theme="dark"] .clock { text-shadow:0 2px 24px rgba(0,0,0,.25); }
.greet { margin-top:10px; font-size:16px; color:var(--text-dim); font-weight:500; }
html[data-theme="glass"] .greet, html[data-theme="dark"] .greet { text-shadow:0 1px 12px rgba(0,0,0,.25); }

/* search */
.searchwrap { position:relative; max-width:560px; margin:22px auto 0; }
.search { display:flex; align-items:center; gap:12px; height:54px; padding:0 18px; border-radius:var(--r-pill); box-shadow:var(--shadow); }
.search input { flex:1; border:0; background:transparent; outline:0; font-size:16px; color:var(--text); font-family:inherit; }
.search input::placeholder { color:var(--text-faint); }
.search .ic { color:var(--text-dim); flex:none; }
.search .kbd { font-size:12px; color:var(--text-faint); border:1px solid var(--field-border); border-radius:6px; padding:2px 7px; font-family:var(--font-display); }

.results { position:absolute; left:0; right:0; top:62px; border-radius:18px; box-shadow:var(--shadow-pop); overflow:hidden; z-index:40; }
.res-item { display:flex; align-items:center; gap:13px; padding:11px 16px; cursor:pointer; border-bottom:1px solid var(--card-border); }
.res-item:last-child { border-bottom:0; }
.res-item:hover, .res-item.active { background:var(--card-hover); }
.res-meta { min-width:0; }
.res-title { font-size:14.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.res-title.folder { color:var(--accent); }
.res-path { font-size:12px; color:var(--text-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.res-empty { padding:18px 16px; color:var(--text-dim); font-size:14px; text-align:center; }

/* toolbar */
.toolbar { display:flex; align-items:center; gap:12px; margin:30px 0 14px; }
.crumbs { display:flex; align-items:center; gap:4px; flex:1; min-width:0; font-size:14px; flex-wrap:wrap; }
.crumb { color:var(--text-dim); cursor:pointer; padding:4px 9px; border-radius:8px; white-space:nowrap; font-weight:500; }
.crumb:hover { background:var(--card-hover); color:var(--text); }
.crumb.current { color:var(--text); cursor:default; font-weight:600; }
.crumb.current:hover { background:transparent; }
.crumb-sep { color:var(--text-faint); }
.tool-actions { display:flex; align-items:center; gap:8px; flex:none; }

.iconbtn { display:inline-flex; align-items:center; justify-content:center; gap:7px; height:38px; min-width:38px; padding:0 12px;
  border-radius:11px; border:1px solid var(--card-border); background:var(--card); color:var(--text); cursor:pointer;
  font-family:inherit; font-size:13.5px; font-weight:500; transition:all .16s var(--ease); backdrop-filter:blur(var(--panel-blur)); }
.iconbtn:hover { background:var(--card-hover); transform:translateY(-1px); box-shadow:var(--shadow); }
.iconbtn.icon-only { padding:0; }
.iconbtn.accent { background:var(--accent); border-color:transparent; color:var(--accent-ink); }
.iconbtn.accent:hover { filter:brightness(1.08); }
.iconbtn.active { background:var(--accent); border-color:transparent; color:var(--accent-ink); }

/* tag chips */
.tagbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.chip { font-size:12.5px; padding:5px 12px; border-radius:var(--r-pill); border:1px solid var(--card-border);
  background:var(--card); color:var(--text-dim); cursor:pointer; transition:all .15s var(--ease); font-weight:500;
  backdrop-filter:blur(var(--panel-blur)); }
.chip:hover { color:var(--text); }
.chip.on { background:var(--accent); color:var(--accent-ink); border-color:transparent; }
.chip-lead { color:var(--text-faint); font-size:12.5px; margin-right:2px; }

/* recents */
.recents { margin:6px 0 4px; }
.rec-head { font-size:12.5px; color:var(--text-dim); font-weight:600; letter-spacing:.04em; margin-bottom:11px; }
html[data-theme="glass"] .rec-head, html[data-theme="dark"] .rec-head { text-shadow:0 1px 10px rgba(0,0,0,.2); }
.rec-row { display:flex; gap:10px; flex-wrap:wrap; }
.rec-item { display:flex; flex-direction:column; align-items:center; gap:6px; width:62px; cursor:pointer; }
.rec-item .fav { transition:transform .16s var(--ease); }
.rec-item:hover .fav { transform:translateY(-3px); }
.rec-item .lbl { font-size:11px; color:var(--text-dim); max-width:62px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:center; }
.rec-empty { font-size:13px; color:var(--text-faint); }

/* favicon tile */
.fav { border-radius:14px; display:grid; place-items:center; font-family:var(--font-display); font-weight:600;
  color:#fff; flex:none; box-shadow:inset 0 1px 0 rgba(255,255,255,.18); position:relative; overflow:hidden; }
.fav img { width:100%; height:100%; object-fit:contain; border-radius:inherit; }
.fav.folder { background:linear-gradient(150deg, color-mix(in srgb, var(--accent) 88%, #fff), color-mix(in srgb, var(--accent) 60%, #000)); }

/* grid */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(var(--tile), 1fr)); gap:var(--gap); }
.tile { position:relative; border-radius:var(--r-card); background:var(--card); border:1px solid var(--card-border);
  padding:18px 12px 14px; display:flex; flex-direction:column; align-items:center; gap:11px; cursor:pointer;
  transition:transform .18s var(--ease), background .18s, box-shadow .18s; backdrop-filter:blur(var(--panel-blur));
  text-align:center; min-height:var(--tile); }
.tile:hover { background:var(--card-hover); transform:translateY(-3px); box-shadow:var(--shadow); }
.tile .t-title { font-size:13px; font-weight:500; color:var(--text); line-height:1.3; max-width:100%;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:break-word; }
.tile .t-host { font-size:11px; color:var(--text-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
.tile.folder .t-count { font-size:11px; color:var(--text-faint); }

.t-more { position:absolute; top:7px; right:7px; width:26px; height:26px; border-radius:8px; border:0; cursor:pointer;
  display:grid; place-items:center; background:transparent; color:var(--text-dim); opacity:0; transition:opacity .15s, background .15s; }
.tile:hover .t-more { opacity:1; }
.t-more:hover { background:rgba(125,125,140,.18); color:var(--text); }
.tile .checkmark { position:absolute; top:8px; left:8px; width:22px; height:22px; border-radius:7px; border:2px solid var(--text-faint);
  background:var(--field); display:grid; place-items:center; opacity:0; transition:opacity .15s; }
.tile:hover .checkmark, html[data-select="on"] .checkmark { opacity:1; }
.tile.selected { outline:2.5px solid var(--accent); outline-offset:1px; }
.tile.selected .checkmark { background:var(--accent); border-color:var(--accent); color:#fff; opacity:1; }

.tile.action { border-style:dashed; background:transparent; color:var(--text-dim); justify-content:center; }
.tile.action:hover { color:var(--text); border-color:var(--accent); background:var(--card); }
.tile.action .a-ic { color:var(--text-dim); }
.tile.back { background:transparent; }

.tile.dragging { opacity:.4; transform:scale(.95); }
.tile.drop-target { outline:2.5px dashed var(--accent); outline-offset:2px; background:var(--card-hover); }
.tile.folder.drop-into { background:color-mix(in srgb, var(--accent) 22%, var(--card)); outline:2.5px solid var(--accent); }

.t-tags { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; }
.t-tagdot { font-size:10px; padding:1px 7px; border-radius:99px; background:var(--field); color:var(--text-dim); }

/* empty state */
.empty { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; gap:14px; padding:60px 0; text-align:center; color:var(--text-dim); }
.empty .e-ic { width:72px; height:72px; border-radius:20px; display:grid; place-items:center; background:var(--card); border:1px solid var(--card-border); color:var(--text-faint); }
.empty .e-title { font-size:16px; font-weight:600; color:var(--text); }
.empty .e-sub { font-size:13.5px; max-width:280px; line-height:1.5; }

/* context popover */
.popmenu { position:fixed; z-index:60; min-width:160px; border-radius:13px; padding:6px; box-shadow:var(--shadow-pop); }
.popmenu button { display:flex; align-items:center; gap:10px; width:100%; border:0; background:transparent; cursor:pointer;
  padding:9px 11px; border-radius:9px; font-family:inherit; font-size:13.5px; color:var(--text); text-align:left; }
.popmenu button:hover { background:var(--card-hover); }
.popmenu button.danger { color:#ef4444; }
.popmenu .sep { height:1px; background:var(--card-border); margin:5px 4px; }

/* selection bar */
.selbar { position:fixed; left:50%; bottom:26px; transform:translateX(-50%); z-index:55; display:flex; align-items:center; gap:8px;
  padding:9px 12px 9px 18px; border-radius:var(--r-pill); box-shadow:var(--shadow-pop); }
.selbar .sel-n { font-size:14px; font-weight:600; margin-right:6px; }

/* dialogs */
.overlay { position:fixed; inset:0; z-index:80; background:rgba(15,18,30,.4); backdrop-filter:blur(3px);
  display:grid; place-items:center; padding:24px; animation:fade .18s var(--ease); }
@keyframes fade { from{opacity:0} to{opacity:1} }
.dialog { width:100%; max-width:440px; border-radius:22px; padding:26px; box-shadow:var(--shadow-pop);
  background:var(--panel); backdrop-filter:blur(calc(var(--panel-blur) + 6px)) saturate(1.5); border:1px solid var(--panel-border);
  animation:pop .22s var(--ease); }
html[data-theme="light"] .dialog { background:#fff; }
@keyframes pop { from{opacity:0; transform:translateY(14px) scale(.97)} to{opacity:1; transform:none} }
.dialog.shake { animation:shake .4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
.dlg-title { font-size:18px; font-weight:600; margin:0 0 4px; }
.dlg-sub { font-size:13.5px; color:var(--text-dim); margin:0 0 18px; line-height:1.5; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:12.5px; font-weight:600; color:var(--text-dim); margin-bottom:6px; }
.input, textarea.input { width:100%; height:44px; border-radius:11px; border:1px solid var(--field-border); background:var(--field);
  padding:0 14px; font-size:14.5px; color:var(--text); font-family:inherit; outline:0; transition:border .15s, box-shadow .15s; }
textarea.input { height:auto; padding:12px 14px; resize:vertical; line-height:1.5; min-height:120px; font-family:var(--font-display); font-size:12.5px; }
.input:focus, textarea.input:focus { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
.dlg-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:22px; }
.btn { height:42px; padding:0 20px; border-radius:11px; border:1px solid var(--field-border); background:var(--field); color:var(--text);
  cursor:pointer; font-family:inherit; font-size:14px; font-weight:600; transition:all .15s var(--ease); }
.btn:hover { background:var(--card-hover); }
.btn.primary { background:var(--accent); color:var(--accent-ink); border-color:transparent; }
.btn.primary:hover { filter:brightness(1.08); }
.btn.danger { background:#ef4444; color:#fff; border-color:transparent; }
.btn.danger:hover { filter:brightness(1.06); }

.tag-edit { display:flex; flex-wrap:wrap; gap:7px; align-items:center; padding:8px; border:1px solid var(--field-border);
  border-radius:11px; background:var(--field); min-height:44px; }
.tag-edit .tk { display:flex; align-items:center; gap:5px; font-size:12.5px; padding:4px 6px 4px 10px; border-radius:99px;
  background:color-mix(in srgb, var(--accent) 16%, transparent); color:var(--accent); font-weight:500; }
.tag-edit .tk b { cursor:pointer; opacity:.7; font-weight:700; }
.tag-edit .tk b:hover { opacity:1; }
.tag-edit input { flex:1; min-width:80px; border:0; background:transparent; outline:0; font-size:14px; color:var(--text); font-family:inherit; height:30px; }

/* settings panel */
.settings { position:fixed; top:0; right:0; height:100vh; width:380px; max-width:92vw; z-index:70;
  box-shadow:var(--shadow-pop); transform:translateX(105%); transition:transform .34s var(--ease);
  display:flex; flex-direction:column; background:var(--panel); backdrop-filter:blur(calc(var(--panel-blur) + 8px)) saturate(1.5);
  border-left:1px solid var(--panel-border); }
html[data-theme="light"] .settings { background:#fff; }
.settings.open { transform:none; }
.set-head { display:flex; align-items:center; justify-content:space-between; padding:20px 22px 16px; border-bottom:1px solid var(--card-border); }
.set-head h2 { font-size:17px; font-weight:600; margin:0; }
.set-tabs { display:flex; gap:4px; padding:12px 14px 0; }
.set-tab { flex:1; padding:9px; border-radius:10px; border:0; background:transparent; cursor:pointer; font-family:inherit;
  font-size:13px; font-weight:600; color:var(--text-dim); transition:all .15s; }
.set-tab.on { background:var(--card); color:var(--text); box-shadow:var(--shadow); }
.set-body { flex:1; overflow-y:auto; padding:18px 22px 40px; }
.set-group { margin-bottom:24px; }
.set-group h3 { font-size:12px; font-weight:700; color:var(--text-faint); letter-spacing:.06em; margin:0 0 14px; text-transform:uppercase; }
.ctrl { margin-bottom:18px; }
.ctrl-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
.ctrl-head .lbl { font-size:13.5px; font-weight:500; }
.ctrl-head .val { font-size:12.5px; color:var(--text-dim); font-family:var(--font-display); }
input[type=range] { -webkit-appearance:none; width:100%; height:5px; border-radius:99px; background:var(--field); outline:0; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--accent);
  cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.25); border:2px solid #fff; }
html[data-theme="dark"] input[type=range]::-webkit-slider-thumb { border-color:#222; }
.seg { display:flex; gap:6px; }
.seg button { flex:1; height:40px; border-radius:10px; border:1px solid var(--card-border); background:var(--card); cursor:pointer;
  font-family:inherit; font-size:13px; font-weight:500; color:var(--text); transition:all .15s; }
.seg button.on { background:var(--accent); color:var(--accent-ink); border-color:transparent; }
.swatches { display:flex; gap:9px; flex-wrap:wrap; }
.sw { width:30px; height:30px; border-radius:9px; cursor:pointer; border:2px solid transparent; transition:transform .12s; }
.sw:hover { transform:scale(1.1); }
.sw.on { border-color:var(--text); box-shadow:0 0 0 2px var(--panel); }
.theme-cards { display:flex; gap:10px; }
.theme-card { flex:1; border-radius:13px; border:2px solid var(--card-border); overflow:hidden; cursor:pointer; transition:all .15s; }
.theme-card.on { border-color:var(--accent); }
.theme-card .swatch { height:54px; }
.theme-card .nm { font-size:12px; font-weight:600; text-align:center; padding:7px 0; }
.color-row { display:flex; align-items:center; gap:12px; }
.color-row input[type=color] { width:42px; height:34px; border:1px solid var(--field-border); border-radius:9px; background:none; cursor:pointer; padding:2px; }

/* about */
.about-logo { width:64px; height:64px; border-radius:18px; background:linear-gradient(150deg,var(--accent),color-mix(in srgb,var(--accent) 50%,#000));
  display:grid; place-items:center; color:#fff; margin-bottom:16px; box-shadow:var(--shadow); }
.about h4 { margin:0 0 2px; font-size:17px; }
.about .ver { font-size:12.5px; color:var(--text-dim); margin-bottom:14px; font-family:var(--font-display); }
.about p { font-size:13.5px; color:var(--text-dim); line-height:1.6; margin:0 0 18px; }
.about .sponsor { border-radius:14px; padding:16px; background:var(--card); border:1px solid var(--card-border); }
.about .sponsor .s-lbl { font-size:11px; color:var(--text-faint); font-weight:600; letter-spacing:.05em; text-transform:uppercase; margin-bottom:10px; }

/* toast */
.toast-host { position:fixed; left:50%; bottom:96px; transform:translateX(-50%); z-index:90; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none; }
.toast { display:flex; align-items:center; gap:9px; padding:10px 18px; border-radius:var(--r-pill); font-size:13.5px; font-weight:500;
  background:var(--panel); backdrop-filter:blur(calc(var(--panel-blur) + 8px)); border:1px solid var(--panel-border); box-shadow:var(--shadow-pop);
  color:var(--text); animation:toastIn .3s var(--ease); }
html[data-theme="light"] .toast { background:#1b1d24; color:#fff; border:0; }
@keyframes toastIn { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none} }
.toast.out { animation:toastOut .3s var(--ease) forwards; }
@keyframes toastOut { to{opacity:0; transform:translateY(8px)} }

.xbtn { width:34px; height:34px; border-radius:10px; border:0; background:transparent; cursor:pointer; display:grid; place-items:center; color:var(--text-dim); }
.xbtn:hover { background:var(--card-hover); color:var(--text); }

.fade-in { animation:fadeUp .4s var(--ease) both; }
@keyframes fadeUp { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }

@media (max-width:640px) {
  .clock { font-size:48px; }
  .toolbar { flex-wrap:wrap; }
}
</style>
</head>
<body>
<div id="wall"></div>
<div id="root"></div>

<script src="dist/bundle.js"></script>
</body>
</html>
