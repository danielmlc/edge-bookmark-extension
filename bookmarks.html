<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bookmarks Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div id="bookmark-breadcrumb" class="bookmark-breadcrumb">
      <!-- 导航路径将在这里显示 -->
    </div>
    
    <div class="search-container">
      <input type="text" id="bookmark-search" class="bookmark-search" placeholder="搜索书签...">
      <div id="search-results" class="search-results"></div>
    </div>
    
    <div id="recent-bookmarks" class="recent-bookmarks">
      <!-- 最近访问的页签将在这里显示 -->
    </div>
    
    <div id="bookmarks-grid" class="bookmarks-grid">
      <!-- Bookmarks will be dynamically inserted here -->
    </div>
  </div>
  <script src="bookmarks.js"></script>
</body>
</html>
